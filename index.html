<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calendar & Task Management System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .time-grid-scroll { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="flex h-screen overflow-hidden">
        
        <!-- 左側側邊欄 -->
        <aside class="w-64 bg-slate-900 text-slate-100 flex flex-col justify-between hidden md:flex z-40">
            <div class="p-5">
                <!-- 根據 image_164f78.png 完美還原的 Logo -->
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-inner p-1">
                        <svg viewBox="0 0 100 100" class="w-full h-full text-[#0d6273]" fill="currentColor">
                            <!-- 中央核心圓點 -->
                            <circle cx="50" cy="50" r="12" />
                            <!-- 外部主圓環 -->
                            <circle cx="50" cy="50" r="32" fill="none" stroke="currentColor" stroke-width="10" />
                            <!-- 8個對稱且微凸出的圓頭輪輻條 -->
                            <g stroke="currentColor" stroke-width="10" stroke-linecap="round">
                                <line x1="50" y1="12" x2="50" y2="40" /> <!-- 上 -->
                                <line x1="50" y1="60" x2="50" y2="88" /> <!-- 下 -->
                                <line x1="12" y1="50" x2="40" y2="50" /> <!-- 左 -->
                                <line x1="60" y1="50" x2="88" y2="50" /> <!-- 右 -->
                                <line x1="23.1" y1="23.1" x2="42.9" y2="42.9" /> <!-- 左上 -->
                                <line x1="57.1" y1="57.1" x2="76.9" y2="76.9" /> <!-- 右下 -->
                                <line x1="76.9" y1="23.1" x2="57.1" y2="42.9" /> <!-- 右上 -->
                                <line x1="42.9" y1="57.1" x2="23.1" y2="76.9" /> <!-- 左下 -->
                            </g>
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-bold text-base tracking-wide leading-none">Chronos</h1>
                        <span class="text-xs text-slate-400">Workspace</span>
                    </div>
                </div>

                <nav class="space-y-1">
                    <button onclick="switchView('database')" id="btn-nav-database" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition bg-slate-800 text-white">
                        <i data-lucide="database" class="w-4 h-4"></i> Database
                    </button>
                    <button onclick="switchView('week')" id="btn-nav-week" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition text-slate-400 hover:bg-slate-800 hover:text-white">
                        <i data-lucide="calendar-range" class="w-4 h-4"></i> Week View
                    </button>
                    <button onclick="switchView('month')" id="btn-nav-month" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition text-slate-400 hover:bg-slate-800 hover:text-white">
                        <i data-lucide="calendar" class="w-4 h-4"></i> Month View
                    </button>
                </nav>
            </div>
            
            <div class="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">
                &copy; 2026 Chronos Engine
            </div>
        </aside>

        <!-- 主內容區域 -->
        <main class="flex-1 flex flex-col min-w-0 bg-slate-50 relative">
            
            <!-- 頂部公共控制列 -->
            <header class="h-16 border-b border-slate-200 bg-white flex items-center justify-between px-4 md:px-6 z-20 shrink-0">
                <div class="flex items-center gap-4 flex-1">
                    <!-- 行動端 Logo 與選單按鈕 -->
                    <div class="flex items-center gap-2 md:hidden">
                        <div class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-lg p-0.5">
                            <svg viewBox="0 0 100 100" class="text-[#0d6273]" fill="currentColor">
                                <circle cx="50" cy="50" r="12" />
                                <circle cx="50" cy="50" r="32" fill="none" stroke="currentColor" stroke-width="10" />
                                <g stroke="currentColor" stroke-width="10" stroke-linecap="round">
                                    <line x1="50" y1="12" x2="50" y2="40" /><line x1="50" y1="60" x2="50" y2="88" />
                                    <line x1="12" y1="50" x2="40" y2="50" /><line x1="60" y1="50" x2="88" y2="50" />
                                    <line x1="23.1" y1="23.1" x2="42.9" y2="42.9" /><line x1="57.1" y1="57.1" x2="76.9" y2="76.9" />
                                    <line x1="76.9" y1="23.1" x2="57.1" y2="42.9" /><line x1="42.9" y1="57.1" x2="23.1" y2="76.9" />
                                </g>
                            </svg>
                        </div>
                    </div>
                    
                    <!-- 搜尋列 -->
                    <div class="relative w-full max-w-md">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="global-search" oninput="handleSearch()" placeholder="搜尋項目名稱或地點 (Festival 類型輸入即可喚醒)..." class="w-full pl-9 pr-4 py-1.5 bg-slate-100 border border-transparent rounded-lg text-sm focus:bg-white focus:border-slate-300 focus:outline-none transition">
                    </div>
                </div>

                <!-- 導覽與新増按鈕 -->
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="flex items-center border border-slate-200 rounded-lg bg-white overflow-hidden p-0.5">
                        <button onclick="navigateTime(-1)" class="p-1.5 hover:bg-slate-50 text-slate-600 rounded-md"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                        <button onclick="jumpToToday()" class="px-2.5 py-1 text-xs font-medium hover:bg-slate-50 text-slate-700 border-x border-slate-100">Today</button>
                        <button onclick="navigateTime(1)" class="p-1.5 hover:bg-slate-50 text-slate-600 rounded-md"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>
                    <span id="current-date-display" class="text-sm font-semibold text-slate-700 hidden sm:inline-block min-w-[120px] text-center"></span>
                    <button onclick="openModal()" class="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium transition shadow-sm">
                        <i data-lucide="plus" class="w-4 h-4"></i> <span class="hidden sm:inline">新増項目</span>
                    </button>
                </div>
            </header>

            <!-- 視圖容器 -->
            <div class="flex-1 overflow-auto relative">
                
                <!-- 1. DATABASE VIEW -->
                <section id="view-database" class="p-4 md:p-6 space-y-4">
                    <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200 text-xs font-semibold text-slate-500 tracking-wider">
                                    <th class="p-3.5">項目名稱</th>
                                    <th class="p-3.5">分類</th>
                                    <th class="p-3.5">開始日期 / 時間</th>
                                    <th class="p-3.5">結束日期 / 時間</th>
                                    <th class="p-3.5">功能與屬性</th>
                                    <th class="p-3.5 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="database-table-body" class="divide-y divide-slate-100 text-sm text-slate-600">
                                <!-- 動態載入 -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- 2. WEEK VIEW -->
                <section id="view-week" class="hidden h-full flex flex-col overflow-hidden">
                    <!-- Sticky Top Header Container -->
                    <div class="sticky top-0 z-30 bg-white border-b border-slate-200 shadow-sm shrink-0">
                        <!-- 日期標題列 -->
                        <div id="week-header-days" class="grid divide-x divide-slate-100 border-b border-slate-100">
                            <!-- 動態渲染，包含時間軸空白左側格 -->
                        </div>
                        <!-- 單日 Deadline / 全天項目置頂展示區 -->
                        <div id="week-header-sticky-tasks" class="grid divide-x divide-slate-100 bg-slate-50/50 text-xs text-slate-600">
                            <!-- 動態渲染 -->
                        </div>
                    </div>

                    <!-- 24小時滾動時間軸 -->
                    <div id="week-time-grid-scroll" class="flex-1 overflow-y-auto time-grid-scroll">
                        <div id="week-time-grid-content" class="relative">
                            <!-- 背景時間線 -->
                            <div id="week-time-lines" class="absolute inset-0 pointer-events-none divide-y divide-slate-100">
                                <!-- 24張線條格 -->
                            </div>
                            <!-- 實體內容格與事件擺放 -->
                            <div id="week-days-columns" class="grid h-[1440px] divide-x divide-slate-100 relative">
                                <!-- 時間刻度左欄與各日 Column -->
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 3. MONTH VIEW -->
                <section id="view-month" class="hidden h-full flex flex-col p-4 overflow-hidden">
                    <div class="grid grid-cols-7 gap-px bg-slate-200 rounded-t-xl overflow-hidden border border-slate-200 shrink-0 text-center py-2 bg-slate-100 text-xs font-semibold text-slate-600 tracking-wider">
                        <div>週日</div><div>週一</div><div>週二</div><div>週三</div><div>週四</div><div>週五</div><div>週六</div>
                    </div>
                    <div id="month-grid" class="flex-1 grid grid-cols-7 grid-rows-6 bg-slate-200 gap-px border-x border-b border-slate-200 rounded-b-xl overflow-hidden">
                        <!-- 動態填充 42 格 -->
                    </div>
                </section>

            </div>
            
            <!-- 行動端底部導覽列 -->
            <footer class="h-14 border-t border-slate-200 bg-white flex items-center justify-around md:hidden z-40 shrink-0">
                <button onclick="switchView('database')" id="btn-mob-database" class="flex flex-col items-center text-slate-400 hover:text-slate-800">
                    <i data-lucide="database" class="w-5 h-5"></i><span class="text-[10px] mt-0.5 font-medium">Database</span>
                </button>
                <button onclick="switchView('week')" id="btn-mob-week" class="flex flex-col items-center text-slate-400 hover:text-slate-800">
                    <i data-lucide="calendar-range" class="w-5 h-5"></i><span class="text-[10px] mt-0.5 font-medium">Week</span>
                </button>
                <button onclick="switchView('month')" id="btn-mob-month" class="flex flex-col items-center text-slate-400 hover:text-slate-800">
                    <i data-lucide="calendar" class="w-5 h-5"></i><span class="text-[10px] mt-0.5 font-medium">Month</span>
                </button>
            </footer>
        </main>
    </div>

    <!-- 新增 / 編輯 彈窗彈出層 -->
    <div id="item-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-200 max-h-[90vh] flex flex-col">
            <header class="px-5 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50 shrink-0">
                <h3 id="modal-title" class="font-semibold text-slate-800 text-base">新増日程項目</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </header>
            <form id="item-form" onsubmit="handleFormSubmit(event)" class="p-5 space-y-4 overflow-y-auto flex-1">
                <input type="hidden" id="form-id">
                
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">項目名稱 *</label>
                    <input type="text" id="form-title" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">分類 (Category)</label>
                        <select id="form-category" onchange="handleCategoryChange()" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400 bg-white">
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Festival">Festival (節日/紀念日)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">功能屬性</label>
                        <select id="form-type" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400 bg-white">
                            <option value="Event">Event (一般事件)</option>
                            <option value="Deadline">Deadline (截止日期)</option>
                            <option value="AllDay">All Day (整天項目)</option>
                        </select>
                    </div>
                </div>

                <div id="date-time-container" class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label id="lbl-start-date" class="block text-xs font-semibold text-slate-500 mb-1">開始日期</label>
                            <input type="date" id="form-start-date" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400">
                        </div>
                        <div id="div-end-date">
                            <label class="block text-xs font-semibold text-slate-500 mb-1">結束日期</label>
                            <input type="date" id="form-end-date" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400">
                        </div>
                    </div>

                    <div id="time-inputs-row" class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">開始時間</label>
                            <input type="time" id="form-start-time" value="09:00" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">結束時間</label>
                            <input type="time" id="form-end-time" value="10:00" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">地點 / 備註</label>
                    <input type="text" id="form-location" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-400">
                </div>

                <div class="pt-2 border-t border-slate-100 flex justify-end gap-2 shrink-0">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-slate-500 hover:bg-slate-100 rounded-lg transition">取消</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-slate-800 hover:bg-slate-900 rounded-lg transition shadow-sm">儲存項目</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 核心邏輯與演算法 JavaScript -->
    <script>
        // --- 1. 基礎架構與初始化資料 ---
        let currentView = 'database';
        let currentDate = new Date(2026, 5, 22); // 預設目前日期為 2026 年 6 月 22 日
        let searchQuery = "";

        // 核心資料庫 (儲存原始輸入與拆分後的單一原子化結構)
        let itemsPool = [
            { id: "1", title: "專案進度匯報會議", category: "Work", type: "Event", startDate: "2026-06-22", endDate: "2026-06-22", startTime: "09:30", endTime: "11:00", location: "會議室 A", isFestival: false },
            { id: "2", title: "年中技術框架審查", category: "Work", type: "Event", startDate: "2026-06-24", endDate: "2026-06-24", startTime: "14:00", endTime: "16:30", location: "線上 Teams", isFestival: false },
            { id: "3", title: "端午節連續假期", category: "Festival", type: "AllDay", startDate: "--06-19", endDate: "", startTime: "", endTime: "", location: "傳統節日", isFestival: true },
            { id: "4", title: "我的生日派對", category: "Festival", type: "AllDay", startDate: "--06-24", endDate: "", startTime: "", endTime: "", location: "家裡", isFestival: true },
            { id: "5", title: "產品代碼凍結點", category: "Work", type: "Deadline", startDate: "2026-06-22", endDate: "2026-06-22", startTime: "18:00", endTime: "18:00", location: "GitHub Repo", isFestival: false },
            { id: "6", title: "全公司年度戰略大會", category: "Work", type: "AllDay", startDate: "2026-06-23", endDate: "2026-06-23", startTime: "", endTime: "", location: "總部大禮堂", isFestival: false }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            switchView('database');
            updateDateDisplay();
        });

        // 監聽視窗縮放以動態切換直橫向 Week 排版
        window.addEventListener('resize', () => {
            if (currentView === 'week') renderWeekView();
        });

        function updateDateDisplay() {
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
            document.getElementById('current-date-display').innerText = currentDate.toLocaleDateString('zh-TW', options);
        }

        // --- 2. 視圖切換與導覽中心 ---
        function switchView(view) {
            currentView = view;
            
            // 隱藏所有視圖
            document.getElementById('view-database').classList.add('hidden');
            document.getElementById('view-week').classList.add('hidden');
            document.getElementById('view-month').classList.add('hidden');
            
            // 移除所有導航的高亮
            const navs = ['database', 'week', 'month'];
            navs.forEach(v => {
                document.getElementById(`btn-nav-${v}`).className = "w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition text-slate-400 hover:bg-slate-800 hover:text-white";
                document.getElementById(`btn-mob-${v}`).className = "flex flex-col items-center text-slate-400 hover:text-slate-800";
            });

            // 啟用對應視圖與亮顯
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`btn-nav-${view}`).className = "w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition bg-slate-800 text-white";
            document.getElementById(`btn-mob-${view}`).className = "flex flex-col items-center text-emerald-600 font-semibold";

            if (view === 'database') renderDatabaseView();
            if (view === 'week') {
                renderWeekView();
                // 異步執行 scrollToWorkingHours 自動向下滾動定位到 08:00
                setTimeout(scrollToWorkingHours, 50);
            }
            if (view === 'month') renderMonthView();
        }

        function navigateTime(direction) {
            if (currentView === 'month') {
                currentDate.setMonth(currentDate.getMonth() + direction);
            } else if (currentView === 'week') {
                const isMobile = window.innerWidth < 768;
                if (isMobile) {
                    // 直向螢幕：每次進退「一天」
                    currentDate.setDate(currentDate.getDate() + direction);
                } else {
                    // 橫向螢幕：每次進退「一週」
                    currentDate.setDate(currentDate.getDate() + (direction * 7));
                }
            } else {
                currentDate.setDate(currentDate.getDate() + direction);
            }
            updateDateDisplay();
            refreshCurrentView();
        }

        function jumpToToday() {
            currentDate = new Date(2026, 5, 22); // 返回預設基準 2026-06-22
            updateDateDisplay();
            refreshCurrentView();
            if (currentView === 'week') setTimeout(scrollToWorkingHours, 50);
        }

        function handleSearch() {
            searchQuery = document.getElementById('global-search').value.trim().toLowerCase();
            refreshCurrentView();
        }

        function refreshCurrentView() {
            if (currentView === 'database') renderDatabaseView();
            if (currentView === 'week') renderWeekView();
            if (currentView === 'month') renderMonthView();
        }

        function scrollToWorkingHours() {
            const scrollContainer = document.getElementById('week-time-grid-scroll');
            if (scrollContainer) {
                // 每一小時高度 60px，8點位置為 8 * 60 = 480px
                scrollContainer.scrollTop = 480;
            }
        }

        // --- 3. 表單彈窗智慧化控制控制項 ---
        function openModal(editId = null) {
            const modal = document.getElementById('item-modal');
            const form = document.getElementById('item-form');
            form.reset();
            document.getElementById('form-id').value = "";
            document.getElementById('modal-title').innerText = "新増日程項目";
            
            // 重設欄位鎖定狀態
            document.getElementById('form-category').disabled = false;
            document.getElementById('form-type').disabled = false;
            document.getElementById('div-end-date').style.display = 'block';
            document.getElementById('time-inputs-row').style.display = 'grid';
            document.getElementById('lbl-start-date').innerText = "開始日期";
            
            // 初始化預設填入目前日期
            const dateStr = formatDate(currentDate);
            document.getElementById('form-start-date').value = dateStr;
            document.getElementById('form-end-date').value = dateStr;

            if (editId) {
                const item = itemsPool.find(i => i.id === editId);
                if (item) {
                    document.getElementById('modal-title').innerText = "編輯日程項目";
                    document.getElementById('form-id').value = item.id;
                    document.getElementById('form-title').value = item.title;
                    document.getElementById('form-category').value = item.category;
                    document.getElementById('form-type').value = item.type;
                    document.getElementById('form-location').value = item.location || "";
                    
                    if (item.isFestival) {
                        // 跨年重複節日格式轉換為當前年以供表單控制
                        document.getElementById('form-start-date').value = `2026${item.startDate.substring(2)}`;
                    } else {
                        document.getElementById('form-start-date').value = item.startDate;
                        document.getElementById('form-end-date').value = item.endDate;
                    }
                    document.getElementById('form-start-time').value = item.startTime || "09:00";
                    document.getElementById('form-end-time').value = item.endTime || "10:00";
                }
            }

            handleCategoryChange();
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.transform').classList.remove('scale-95');
            }, 10);
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('item-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        function handleCategoryChange() {
            const category = document.getElementById('form-category').value;
            const typeSelect = document.getElementById('form-type');
            const lblStartDate = document.getElementById('lbl-start-date');
            const divEndDate = document.getElementById('div-end-date');
            const timeRow = document.getElementById('time-inputs-row');

            if (category === 'Festival') {
                // 自動變更邏輯與防呆鎖定
                typeSelect.value = 'AllDay';
                typeSelect.disabled = true; // 強制固定為 All Day Event
                lblStartDate.innerText = "Date";
                divEndDate.style.display = 'none'; // 隱藏 End Date
                timeRow.style.display = 'none';    // 隱藏時間輸入
            } else {
                typeSelect.disabled = false;
                lblStartDate.innerText = "開始日期";
                
                // 依據形態動態呈現對應時間排版
                if (typeSelect.value === 'AllDay') {
                    divEndDate.style.display = 'block';
                    timeRow.style.display = 'none';
                } else {
                    divEndDate.style.display = 'block';
                    timeRow.style.display = 'grid';
                }
            }
        }
        
        // 綁定形態改變監聽器
        document.getElementById('form-type').addEventListener('change', () => {
            const type = document.getElementById('form-type').value;
            const timeRow = document.getElementById('time-inputs-row');
            if (type === 'AllDay') {
                timeRow.style.display = 'none';
            } else {
                timeRow.style.display = 'grid';
            }
        });

        // --- 4. 關鍵演算法：資料儲存拆分與跨年過濾處理中心 ---
        function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('form-id').value;
            const title = document.getElementById('form-title').value.trim();
            const category = document.getElementById('form-category').value;
            const type = document.getElementById('form-type').value;
            const rawStart = document.getElementById('form-start-date').value;
            const rawEnd = document.getElementById('form-end-date').value;
            const startTime = document.getElementById('form-start-time').value;
            const endTime = document.getElementById('form-end-time').value;
            const location = document.getElementById('form-location').value.trim();

            if (id) {
                // 編輯模式：先移出原有舊資料項
                itemsPool = itemsPool.filter(i => i.id !== id);
            }

            if (category === 'Festival') {
                // 不填寫年份、每年重複項目儲存機制：格式化為 --MM-DD
                const mmdd = rawStart.substring(4); // 取得 -MM-DD 部分
                const newFestivalItem = {
                    id: id || Date.now().toString(),
                    title: title,
                    category: 'Festival',
                    type: 'AllDay',
                    startDate: `-${mmdd}`,
                    endDate: '',
                    startTime: '',
                    endTime: '',
                    location: location,
                    isFestival: true
                };
                itemsPool.push(newFestivalItem);
            } else if (type === 'AllDay') {
                // 關鍵優化需求 2：All Day 多天跨度在儲存時完全拆分為獨立項目
                const start = new Date(rawStart);
                const end = rawEnd ? new Date(rawEnd) : new Date(rawStart);
                
                let currentLoop = new Date(start);
                let count = 0;
                while (currentLoop <= end) {
                    const singleDateStr = formatDate(currentLoop);
                    itemsPool.push({
                        id: (id && count === 0) ? id : `${Date.now()}-${count}`,
                        title: title,
                        category: category,
                        type: 'AllDay',
                        startDate: singleDateStr,
                        endDate: singleDateStr, // 預設並鎖定為當天結束
                        startTime: '',
                        endTime: '',
                        location: location,
                        isFestival: false
                    });
                    currentLoop.setDate(currentLoop.getDate() + 1);
                    count++;
                }
            } else {
                // 普通 Event 或 Deadline 儲存
                itemsPool.push({
                    id: id || Date.now().toString(),
                    title: title,
                    category: category,
                    type: type,
                    startDate: rawStart,
                    endDate: rawEnd || rawStart,
                    startTime: startTime,
                    endTime: endTime,
                    location: location,
                    isFestival: false
                });
            }

            closeModal();
            refreshCurrentView();
        }

        function deleteItem(id) {
            if (confirm('確定要刪除此日程項目嗎？(若是拆分後的項目，將只刪除目前選中的單日項目)')) {
                itemsPool = itemsPool.filter(i => i.id !== id);
                refreshCurrentView();
            }
        }

        // 輔助工具：將任何萬年曆 Festival 或一般事件解析轉換為某特定年份下的具體真實 Date
        function resolveItemDatesForYear(item, year) {
            if (item.isFestival) {
                const mmdd = item.startDate.replace(/^-+/, ''); // 得到 MM-DD
                return {
                    startStr: `${year}-${mmdd}`,
                    endStr: `${year}-${mmdd}`,
                    isMatch: true
                };
            }
            return {
                startStr: item.startDate,
                endStr: item.endDate,
                isMatch: false
            };
        }

        // --- 5. 各視圖渲染模組 ---

        // A. DATABASE VIEW RENDER
        function renderDatabaseView() {
            const tbody = document.getElementById('database-table-body');
            tbody.innerHTML = "";

            itemsPool.forEach(item => {
                const isMatchSearch = item.title.toLowerCase().includes(searchQuery) || (item.location && item.location.toLowerCase().includes(searchQuery));
                
                // 核心邏輯需求：Festival 平時在資料庫主列表「隱形」，只有當搜尋列被激活且匹配時才喚醒
                if (item.isFestival && (!searchQuery || !isMatchSearch)) {
                    return; 
                }
                if (searchQuery && !isMatchSearch) {
                    return; // 沒匹配到搜尋的普通項目亦過濾掉
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition";
                
                let dateDisplayStart = item.startDate;
                let dateDisplayEnd = item.endDate || "--";
                if (item.isFestival) {
                    dateDisplayStart = `每年 ${item.startDate.replace(/^-+/, '')}`;
                    dateDisplayEnd = "無期限 (常駐項目)";
                }

                tr.innerHTML = `
                    <td class="p-3.5 font-medium text-slate-800">${escapeHtml(item.title)}</td>
                    <td class="p-3.5">
                        <span class="px-2 py-0.5 text-xs font-medium rounded-full ${item.category === 'Work' ? 'bg-blue-50 text-blue-600' : item.category === 'Festival' ? 'bg-purple-50 text-purple-600' : 'bg-slate-100 text-slate-600'}">
                            ${item.category}
                        </span>
                    </td>
                    <td class="p-3.5 text-xs font-mono">${dateDisplayStart} ${item.startTime ? ' @ ' + item.startTime : ''}</td>
                    <td class="p-3.5 text-xs font-mono">${dateDisplayEnd} ${item.endTime ? ' @ ' + item.endTime : ''}</td>
                    <td class="p-3.5">
                        <span class="px-2 py-0.5 text-xs font-medium rounded ${item.type === 'Deadline' ? 'bg-rose-50 text-rose-600 border border-rose-100' : item.type === 'AllDay' ? 'bg-amber-50 text-amber-600 border border-amber-100' : 'bg-emerald-50 text-emerald-600'}">
                            ${item.type}
                        </span>
                    </td>
                    <td class="p-3.5 text-right space-x-1.5">
                        <button onclick="openModal('${item.id}')" class="text-slate-400 hover:text-slate-700 transition inline-flex items-center"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="deleteItem('${item.id}')" class="text-slate-400 hover:text-rose-600 transition inline-flex items-center"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        // B. WEEK VIEW RENDER
        function renderWeekView() {
            const isMobile = window.innerWidth < 768; 
            const headerDays = document.getElementById('week-header-days');
            const headerStickyTasks = document.getElementById('week-header-sticky-tasks');
            const linesGrid = document.getElementById('week-time-lines');
            const columnsGrid = document.getElementById('week-days-columns');

            headerDays.innerHTML = "";
            headerStickyTasks.innerHTML = "";
            linesGrid.innerHTML = "";
            columnsGrid.innerHTML = "";

            // 1. 計算該畫面的目標顯示日期群組
            let targetDates = [];
            if (isMobile) {
                // 核心優化需求 3：直向螢幕移動端 Today (即目前選中日) 永遠強制放在最左邊，只拉出隨後連續 3 天
                for (let i = 0; i < 3; i++) {
                    const d = new Date(currentDate);
                    d.setDate(currentDate.getDate() + i);
                    targetDates.push(d);
                }
            } else {
                // 桌面端：維持標準週曆排版 (計算目前日期所在完整一週)
                const currentDayOfWeek = currentDate.getDay(); // 0 是週日
                const startOfWeek = new Date(currentDate);
                startOfWeek.setDate(currentDate.getDate() - currentDayOfWeek);
                for (let i = 0; i < 7; i++) {
                    const d = new Date(startOfWeek);
                    d.setDate(startOfWeek.getDate() + i);
                    targetDates.push(d);
                }
            }

            const totalCols = targetDates.length;
            headerDays.style.gridTemplateColumns = `minmax(60px, 60px) repeat(${totalCols}, minmax(0, 1fr))`;
            headerStickyTasks.style.gridTemplateColumns = `minmax(60px, 60px) repeat(${totalCols}, minmax(0, 1fr))`;
            columnsGrid.style.gridTemplateColumns = `minmax(60px, 60px) repeat(${totalCols}, minmax(0, 1fr))`;

            // 2. 渲染左上角時間軸空白定位格與各日期頂部標題
            const cornerEmpty = document.createElement('div');
            cornerEmpty.className = "bg-slate-50 border-b border-slate-100";
            headerDays.appendChild(cornerEmpty);

            const taskCornerEmpty = document.createElement('div');
            taskCornerEmpty.className = "bg-slate-50/50 flex items-center justify-center border-b border-slate-100 text-[10px] text-slate-400 font-medium font-mono";
            taskCornerEmpty.innerText = "置頂";
            headerStickyTasks.appendChild(taskCornerEmpty);

            const weekDayNames = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
            const todayStamp = formatDate(new Date(2026, 5, 22)); // 系統預設今日

            targetDates.forEach(date => {
                const dateStr = formatDate(date);
                const isToday = (dateStr === todayStamp);
                
                const dayHeader = document.createElement('div');
                dayHeader.className = `p-2 text-center flex flex-col items-center justify-center ${isToday ? 'bg-emerald-50/60' : ''}`;
                dayHeader.innerHTML = `
                    <span class="text-xs font-medium ${isToday ? 'text-emerald-600' : 'text-slate-500'}">${weekDayNames[date.getDay()]}</span>
                    <span class="text-base font-bold tracking-tight mt-0.5 ${isToday ? 'w-7 h-7 bg-emerald-600 text-white rounded-full flex items-center justify-center shadow-sm' : 'text-slate-800'}">${date.getDate()}</span>
                `;
                headerDays.appendChild(dayHeader);

                // 為每列初始化建立置頂容器格
                const stickyTaskCell = document.createElement('div');
                stickyTaskCell.id = `sticky-box-${dateStr}`;
                stickyTaskCell.className = `p-1.5 space-y-1 min-h-[40px] border-b border-slate-100 flex flex-col justify-start ${isToday ? 'bg-emerald-50/30' : ''}`;
                headerStickyTasks.appendChild(stickyTaskCell);
            });

            // 3. 繪製背景 24 小時橫線
            for (let h = 0; h < 24; h++) {
                const hourLine = document.createElement('div');
                hourLine.className = "h-[60px] border-b border-slate-100 w-full";
                linesGrid.appendChild(hourLine);
            }

            // 4. 建立時間軸最左側 24 小時制時間刻度欄
            const timeCol = document.createElement('div');
            timeCol.className = "bg-slate-50/80 font-mono text-[11px] text-slate-400 font-medium flex flex-col select-none relative pt-[30px]";
            for (let h = 1; h < 24; h++) {
                const label = document.createElement('div');
                label.className = "absolute left-2 -translate-y-1/2";
                label.style.top = `${h * 60}px`;
                label.innerText = `${h.toString().padStart(2, '0')}:00`;
                timeCol.appendChild(label);
            }
            columnsGrid.appendChild(timeCol);

            // 5. 建立各日主要排程事件渲染 Column
            targetDates.forEach(date => {
                const dateStr = formatDate(date);
                const isToday = (dateStr === todayStamp);
                
                const col = document.createElement('div');
                col.className = "relative h-full w-full assign-col";
                col.id = `week-col-${dateStr}`;
                if (isToday) col.classList.add('bg-emerald-50/10');
                columnsGrid.appendChild(col);
            });

            // 6. 分派事件到各個時間 Column 與置頂 Sticky Area
            itemsPool.forEach(item => {
                const isMatchSearch = item.title.toLowerCase().includes(searchQuery) || (item.location && item.location.toLowerCase().includes(searchQuery));
                if (searchQuery && !isMatchSearch) return;

                targetDates.forEach(date => {
                    const resolved = resolveItemDatesForYear(item, date.getFullYear());
                    const targetStr = formatDate(date);

                    if (resolved.startStr === targetStr) {
                        // 核心優化需求 5：Deadline 與 AllDay 完美歸類至固定置頂 Sticky 區段
                        if (item.type === 'AllDay') {
                            const stickyBox = document.getElementById(`sticky-box-${targetStr}`);
                            if (stickyBox) {
                                const chip = document.createElement('div');
                                chip.className = "px-2 py-1 text-xs bg-amber-50 text-amber-800 border border-amber-200 rounded font-medium shadow-2xs truncate cursor-pointer hover:brightness-95 transition";
                                // 核心優化需求 2：不帶 📢 符號也不帶 (Until) 贅字
                                chip.innerText = item.title;
                                chip.onclick = () => openModal(item.id);
                                stickyBox.appendChild(chip);
                            }
                        } else if (item.type === 'Deadline') {
                            const stickyBox = document.getElementById(`sticky-box-${targetStr}`);
                            if (stickyBox) {
                                const chip = document.createElement('div');
                                chip.className = "px-2 py-1 text-xs bg-rose-50 text-rose-800 border border-rose-200 rounded font-medium shadow-2xs truncate cursor-pointer hover:brightness-95 transition flex items-center gap-1";
                                chip.innerHTML = `⚠️ <span class="truncate">${item.title}</span>`;
                                chip.onclick = () => openModal(item.id);
                                stickyBox.appendChild(chip);
                            }
                        } else {
                            // 普通具有特定起訖時間的 Event 項目渲染至 24 小時軸
                            const targetCol = document.getElementById(`week-col-${targetStr}`);
                            if (targetCol) {
                                const startMin = parseTimeToMinutes(item.startTime || "09:00");
                                const endMin = parseTimeToMinutes(item.endTime || "10:00");
                                const topPx = (startMin / 60) * 60;
                                const heightPx = Math.max(((endMin - startMin) / 60) * 60, 25); // 防呆最小高度

                                const card = document.createElement('div');
                                card.className = `absolute left-1 right-1 p-2 rounded-lg text-xs border shadow-2xs flex flex-col justify-between overflow-hidden cursor-pointer hover:shadow-sm transition ${item.category === 'Work' ? 'bg-blue-50/95 border-blue-200 text-blue-800' : 'bg-slate-100/95 border-slate-300 text-slate-800'}`;
                                card.style.top = `${topPx}px`;
                                card.style.height = `${heightPx}px`;
                                
                                card.innerHTML = `
                                    <div class="font-semibold truncate">${escapeHtml(item.title)}</div>
                                    <div class="text-[10px] opacity-75 font-mono mt-0.5">${item.startTime}-${item.endTime}</div>
                                `;
                                card.onclick = () => openModal(item.id);
                                targetCol.appendChild(card);
                            }
                        }
                    }
                });
            });
            lucide.createIcons();
        }

        // C. MONTH VIEW RENDER
        function renderMonthView() {
            const grid = document.getElementById('month-grid');
            grid.innerHTML = "";

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // 獲取該月第一天是星期幾
            const firstDayIndex = new Date(year, month, 1).getDay();
            // 獲取該月總天數
            const totalDays = new Date(year, month + 1, 0).getDate();
            // 上個月總天數
            const prevMonthTotalDays = new Date(year, month, 0).getDate();

            let dayCounter = 1;
            let nextMonthDayCounter = 1;

            const todayStamp = formatDate(new Date(2026, 5, 22));

            // 精準繪製月曆 42 格 (6 橫列 * 7 直欄)
            for (let i = 0; i < 42; i++) {
                const cell = document.createElement('div');
                cell.className = "bg-white p-1.5 flex flex-col min-h-0 overflow-hidden relative group";
                
                let targetDateObj = null;

                if (i < firstDayIndex) {
                    // 填補上個月尾巴日期
                    const d = prevMonthTotalDays - firstDayIndex + i + 1;
                    cell.classList.add('bg-slate-50/60', 'text-slate-400');
                    targetDateObj = new Date(year, month - 1, d);
                } else if (dayCounter > totalDays) {
                    // 填補下個月開頭日期
                    cell.classList.add('bg-slate-50/60', 'text-slate-400');
                    targetDateObj = new Date(year, month + 1, nextMonthDayCounter);
                    nextMonthDayCounter++;
                } else {
                    // 當月核心日期
                    targetDateObj = new Date(year, month, dayCounter);
                    const currentStr = formatDate(targetDateObj);
                    if (currentStr === todayStamp) {
                        cell.classList.add('bg-emerald-50/40');
                    }
                    dayCounter++;
                }

                const cellDateStr = formatDate(targetDateObj);
                
                // 建立日期小數字顯示器
                const numLabel = document.createElement('span');
                numLabel.className = `text-xs font-bold font-mono mb-1 inline-block w-5 h-5 text-center leading-5 ${cellDateStr === todayStamp ? 'bg-emerald-600 text-white rounded-full' : 'text-slate-700'}`;
                numLabel.innerText = targetDateObj.getDate();
                cell.appendChild(numLabel);

                // 收集當天所有匹配的日程項目
                let dayItems = [];
                itemsPool.forEach(item => {
                    const isMatchSearch = item.title.toLowerCase().includes(searchQuery) || (item.location && item.location.toLowerCase().includes(searchQuery));
                    if (searchQuery && !isMatchSearch) return;

                    const resolved = resolveItemDatesForYear(item, targetDateObj.getFullYear());
                    if (resolved.startStr === cellDateStr) {
                        dayItems.push(item);
                    }
                });

                // 核心優化演算法需求 2：嚴格進行垂直加權排序排列
                // 排序權重：AllDay（最前） -> 普通Event（按時間升序） -> Deadline（最後）
                dayItems.sort((a, b) => {
                    const typeWeight = { 'AllDay': 1, 'Event': 2, 'Deadline': 3 };
                    const wa = typeWeight[a.type] || 2;
                    const wb = typeWeight[b.type] || 2;
                    
                    if (wa !== wb) return wa - wb;
                    
                    // 如果同為普通 Event 則按開始時間升序排序
                    if (a.type === 'Event' && b.type === 'Event') {
                        return (a.startTime || "").localeCompare(b.startTime || "");
                    }
                    return 0;
                });

                // 渲染晶片到格子中
                const chipsContainer = document.createElement('div');
                chipsContainer.className = "flex-1 overflow-y-auto no-scrollbar space-y-1";
                
                dayItems.forEach(item => {
                    const chip = document.createElement('div');
                    chip.onclick = (e) => { e.stopPropagation(); openModal(item.id); };
                    
                    if (item.type === 'AllDay') {
                        chip.className = "px-1.5 py-0.5 text-[10px] font-medium bg-amber-50 text-amber-800 border border-amber-100 rounded truncate cursor-pointer hover:brightness-95";
                        chip.innerText = item.title; // 移除了📢與Until文字
                    } else if (item.type === 'Deadline') {
                        chip.className = "px-1.5 py-0.5 text-[10px] font-medium bg-rose-50 text-rose-800 border border-rose-100 rounded truncate cursor-pointer hover:brightness-95 flex items-center gap-0.5";
                        chip.innerHTML = `⚠️ <span class="truncate">${item.title}</span>`;
                    } else {
                        chip.className = `px-1.5 py-0.5 text-[10px] font-medium rounded truncate cursor-pointer hover:brightness-95 border ${item.category === 'Work' ? 'bg-blue-50 text-blue-700 border-blue-100' : 'bg-slate-100 text-slate-700 border-slate-200'}`;
                        chip.innerText = `${item.startTime || ''} ${item.title}`;
                    }
                    chipsContainer.appendChild(chip);
                });

                cell.appendChild(chipsContainer);
                grid.appendChild(cell);
            }
        }

        // --- 6. 通用核心輔助函數群 ---
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function parseTimeToMinutes(timeStr) {
            if (!timeStr) return 0;
            const [h, m] = timeStr.split(':').map(Number);
            return (h * 60) + m;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
